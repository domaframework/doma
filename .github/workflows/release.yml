name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false

env:
  JDK_DISTRIBUTION: zulu
  JDK_VERSION_LATEST_LTS: 25

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      release_ref: ${{ steps.release-ref.outputs.release_ref }}

    steps:
      - name: Assign input version
        if: inputs.version != ''
        run: echo "RELEASE_VERSION=${{ inputs.version }}" >> $GITHUB_ENV

      - name: Get latest draft release title
        if: inputs.version == ''
        run: |
          TITLE=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.draft==true) | .name' | head -n 1)
          if [[ -z "$TITLE" ]]; then
            echo "No draft release found."
            exit 1
          fi          
          echo "RELEASE_VERSION=$TITLE" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up the latest LTS JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: ${{ env.JDK_DISTRIBUTION }}
          java-version: ${{ env.JDK_VERSION_LATEST_LTS }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Prepare git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Release ${{ env.RELEASE_VERSION }}
        run: >
          ./gradlew
          -Prelease.releaseVersion=${{ env.RELEASE_VERSION }}
          --no-configuration-cache
          release

      - name: Assign release ref
        id: release-ref
        run: echo "release_ref=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build
          path: ./**/build/reports

  verify-and-publish:
    name: Verify and Publish
    needs: release
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.release.outputs.release_ref }}
      publish: true
    secrets: inherit
